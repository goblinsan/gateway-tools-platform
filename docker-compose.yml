# Gateway Tools Platform – docker-compose
#
# Blue/green deployment pattern:
#   The gateway-control-plane starts either the "blue" or "green" service
#   and health-checks /api/health before routing traffic.  Both services
#   share the same image tag; only the published port differs.
#
# Usage:
#   docker compose up -d          # start the app on port 3000
#   docker compose --profile blue up -d   # start blue slot (port 3000)
#   docker compose --profile green up -d  # start green slot (port 3001)

x-app-common: &app-common
  build: .
  image: gateway-tools-platform:latest
  env_file:
    - ${APP_ENV_FILE:-.env.local}
  volumes:
    - ${DATA_ROOT_HOST:-./data}:/data
  restart: unless-stopped
  healthcheck:
    test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
    interval: 30s
    timeout: 5s
    retries: 3
    start_period: 10s

services:
  app:
    <<: *app-common
    ports:
      - "${HOST_PORT:-3000}:3000"

  # ── Blue slot (primary) ──────────────────────────────────────────────────────
  blue:
    <<: *app-common
    profiles: [blue]
    container_name: gateway-tools-blue
    ports:
      - "${HOST_PORT:-3000}:3000"

  # ── Green slot (standby / next version) ─────────────────────────────────────
  green:
    <<: *app-common
    profiles: [green]
    container_name: gateway-tools-green
    ports:
      - "${HOST_PORT:-3000}:3000"
